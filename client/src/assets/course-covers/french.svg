      <text x="265" y="220" text-anchor="middle" fill="#ffffff" font-size="46">vocabulaire</text>
    </g>

    <g font-weight="800">
      <rect x="860" y="170" width="240" height="90" rx="26" fill="#a855f7" opacity="0.92"/>
      <text x="980" y="230" text-anchor="middle" fill="#ffffff" font-size="46">FRANÇAIS</text>
