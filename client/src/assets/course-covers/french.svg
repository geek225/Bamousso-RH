    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <g opacity="0.10" fill="#0f172a">
    <circle cx="210" cy="140" r="120"/>
    <circle cx="1040" cy="120" r="160"/>
    <circle cx="980" cy="520" r="220"/>
  </g>

  <g filter="url(#shadow)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="900">
    <g>
