<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 .12 0" />
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#g)"/>
  <rect width="1200" height="600" filter="url(#noise)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round">
    <path d="M120 190c90-70 170-70 260 0" />
    <path d="M160 340c70-40 160-40 230 0" />
    <path d="M740 150c70-30 150-30 220 0" />
    <path d="M780 320c60-20 150-20 210 0" />
    <path d="M240 460l90-120 90 120" />
    <path d="M870 420c0 60-40 90-90 90" />
  </g>
  <g fill="#ffffff" fill-opacity="0.72" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34">
    <text x="90" y="120">a² + b² = c²</text>
    <text x="90" y="280">∑ f(x) dx</text>
    <text x="90" y="520">(x + y)² = x² + 2xy + y²</text>
    <text x="720" y="220">x = (-b ± √(b² - 4ac)) / 2a</text>
    <text x="720" y="520">π ≈ 3.14159</text>
  </g>
  <g>
    <rect x="390" y="200" width="420" height="200" rx="26" fill="#000000" fill-opacity="0.35" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="600" y="325" text-anchor="middle" fill="#ffffff" font-size="84" font-weight="800" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial">MATH</text>
  </g>
</svg>
